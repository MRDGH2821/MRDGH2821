---
# yaml-language-server: $schema=https://raw.githubusercontent.com/megalinter/megalinter/main/megalinter/descriptors/schemas/megalinter-configuration.jsonschema.json
APPLY_FIXES: all
CLEAR_REPORT_FOLDER: true
DISABLE_LINTERS:
  - MARKDOWN_MARKDOWN_TABLE_FORMATTER
  - REPOSITORY_KICS
  - REPOSITORY_DEVSKIM
EXCLUDED_DIRECTORIES:
  - .devcontainer
  - .vscode
  - .zed
FILEIO_REPORTER: false
IGNORE_GITIGNORED_FILES: true
JSON_PRETTIER_PRE_COMMANDS:
  - command: npm i -g prettier-plugin-toml
    continue_if_failed: true
    cwd: root
    secured_env: true
    tag: default
MARKDOWN_MARKDOWN_LINK_CHECK_CONFIG_FILE: markdown-link-check.json
SHOW_ELAPSED_TIME: true
SPELL_CSPELL_ANALYZE_FILE_NAMES: false
YAML_PRETTIER_PRE_COMMANDS:
  - command: npm i prettier-plugin-toml
    continue_if_failed: true
    cwd: root
    secured_env: true
    tag: default
